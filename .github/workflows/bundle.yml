name: Build Flatpak bundle

# Builds a single-file .flatpak bundle and attaches it to the GitHub release
# for the pushed tag. This is the "double-click to install" distribution path
# (no store, no auto-updates). See docs/DISTRIBUTION.md.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build bundle
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Build bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: io.github.drvonmiau.Easel.flatpak
          manifest-path: io.github.drvonmiau.Easel.json
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: easel-flatpak-bundle
          path: io.github.drvonmiau.Easel.flatpak

  release:
    name: Attach bundle to release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: easel-flatpak-bundle

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: io.github.drvonmiau.Easel.flatpak
